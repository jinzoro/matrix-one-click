# ============================================================
# Redis Configuration — Matrix Homeserver Stack
# ============================================================
# Purpose: Synapse worker coordination, presence caching,
#          stream replication, and rate limiting data.
#
# NOTE: The 'requirepass' directive is NOT in this file.
# The Redis password is passed via the command-line flag
# '--requirepass ${REDIS_PASSWORD}' in compose.yaml.
# This avoids storing the plaintext password in a config file
# that is mounted read-only into the container.
# ============================================================

# ──────────────────────────────────────────────────────────
# Network
# ──────────────────────────────────────────────────────────
# Bind to all interfaces within the Docker network.
# Security is provided by the Docker internal network,
# password authentication, and container isolation.
bind 0.0.0.0

port 6379

# Enable TCP keepalive (recommended for Docker networking)
tcp-keepalive 300

# Close connection after client idle for this many seconds (0 = disabled)
timeout 0

# ──────────────────────────────────────────────────────────
# Security
# ──────────────────────────────────────────────────────────
# Protected mode requires authentication when binding to
# non-loopback addresses. Password set via command-line.
protected-mode yes

# Rename dangerous commands to prevent accidental misuse.
# Empty string disables the command entirely.
rename-command CONFIG    ""
rename-command DEBUG     ""
rename-command FLUSHALL  "MATRIX_FLUSH_ALL_DISABLED"
rename-command FLUSHDB   "MATRIX_FLUSH_DB_DISABLED"

# ──────────────────────────────────────────────────────────
# Persistence
# ──────────────────────────────────────────────────────────
# RDB snapshots: save if N writes in M seconds
save 900 1
save 300 10
save 60 10000

# RDB file location
dir /data
dbfilename dump.rdb

# Disable AOF (Append-Only File) — RDB is sufficient for
# Synapse's use case (caching / worker coordination).
# If you want stronger durability, set appendonly yes.
appendonly no

# ──────────────────────────────────────────────────────────
# Memory
# ──────────────────────────────────────────────────────────
# Maximum memory Redis will use. Increase on high-traffic servers.
maxmemory 256mb

# Eviction policy: remove least-recently-used keys when full.
# allkeys-lru is appropriate for a cache-like workload.
maxmemory-policy allkeys-lru

# ──────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────
# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (captured by Docker)
logfile ""

# ──────────────────────────────────────────────────────────
# Performance
# ──────────────────────────────────────────────────────────
# Number of databases (Synapse only uses db 0)
databases 1

# Max clients simultaneously connected
maxclients 100

# Disable slow log for production (or set threshold)
slowlog-log-slower-than 10000
slowlog-max-len 128
