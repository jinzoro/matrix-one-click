server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Disable access logs for well-known requests (high frequency, low value)
    access_log off;

    # ──────────────────────────────────────────────────────
    # Well-known Matrix endpoints
    # Files are served from /usr/share/nginx/html/.well-known/matrix/
    # which is bind-mounted from data/well-known/ on the host.
    #
    # client → data/well-known/client
    # server → data/well-known/server
    # ──────────────────────────────────────────────────────
    location /.well-known/matrix/ {
        # Serve files without extension with application/json content type
        types { }
        default_type application/json;

        # CORS headers required for browser clients (Element, etc.)
        add_header Access-Control-Allow-Origin  "*"              always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

        # Cache for 1 hour (3600 seconds)
        add_header Cache-Control "public, max-age=3600" always;

        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Try to serve the file; return 404 if not found
        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────
    # Health check endpoint (used by Docker healthcheck)
    # ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ──────────────────────────────────────────────────────
    # Deny all other requests
    # This service ONLY serves /.well-known/matrix/
    # ──────────────────────────────────────────────────────
    location / {
        return 404;
    }
}
